[workspace]
members = ["hbackup-cli", "hbackup-core"]
resolver = "3"

[workspace.dependencies]
clap = { version = "4.5.60", features = ["derive"] }
tokio = { version = "1.50.0", features = ["rt-multi-thread", "fs", "macros"] }
anyhow = "1.0.102"
serde = { version = "1.0.228", features = ["derive"] }
dirs = "6.0.0"
thiserror = "2.0.18"
toml = "1.0.6"
tempfile = "3.26.0"

[profile.release]
debug = 1
panic = "abort"

[profile.release-lto]
inherits = "release"
opt-level = 3
strip = "symbols"
lto = "fat"
panic = "abort"
debug-assertions = false
incremental = false
codegen-units = 1